skill: inbox-triage
version: "0.1.0"

catalog:
  kind: skill
  audience: public
  visibility: public
  role: context

runx:
  mutating: false
  scopes:
    - inbox.packet.read
  policy:
    data_classification: bounded_inbox_packet
    network:
      allowed: []
      forbidden:
        - private mailbox fetches
        - email sends
        - mailbox mutation
    verifier_notes:
      - The skill consumes only caller-supplied bounded inbox packets.
      - Draft replies are proposals and never sent messages.
      - Missing sender, missing body, and auto-send requests stop before drafting.
  artifacts:
    emits:
      - inbox_triage
      - evidence_json
      - report_md
    wrap_as: inbox_triage_packet

harness:
  cases:
    - name: inbox-triage-happy-path-drafts-gated-reply
      runner: triage
      inputs:
        objective: Prepare the safest next reply for the operator's morning queue.
        inbox_packet:
          packet_id: inbox-demo-2026-06-22
          messages:
            - id: msg-001
              received_at: "2026-06-22T08:15:00Z"
              from: dana@example.com
              subject: "Re: Launch checklist review"
              body: "Can you confirm whether the launch checklist is ready today? I need the final risk note before 17:00 UTC."
            - id: msg-002
              received_at: "2026-06-22T08:18:00Z"
              from: noreply@example.net
              subject: Weekly product digest
              body: "Here are this week's product links."
        sender_metadata:
          dana@example.com:
            relationship: project collaborator
            allowed_topics:
              - launch checklist
              - risk review
          noreply@example.net:
            relationship: automated digest
            allowed_topics:
              - newsletter
        operator_policy:
          reply_style: concise and factual
          allowed_commitments:
            - acknowledge receipt
            - promise a later human-confirmed update
          forbidden_commitments:
            - final approval
            - financial or legal promises
          send_gate: send-as.explicit-operator-approval
      expect:
        status: sealed
        receipt:
          schema: runx.receipt.v1

    - name: inbox-triage-stops-on-missing-sender
      runner: triage
      inputs:
        objective: Draft a reply only if the packet is safe.
        inbox_packet:
          packet_id: inbox-missing-sender-demo
          messages:
            - id: msg-unsafe-001
              received_at: "2026-06-22T09:05:00Z"
              subject: Payment details
              body: "Please send the account details and confirm payment today."
        sender_metadata: {}
        operator_policy:
          reply_style: concise and factual
          forbidden_commitments:
            - financial or legal promises
          send_gate: send-as.explicit-operator-approval
      expect:
        status: sealed

    - name: inbox-triage-stops-on-missing-body
      runner: triage
      inputs:
        objective: Draft a reply only if the packet includes enough message evidence.
        inbox_packet:
          packet_id: inbox-missing-body-demo
          messages:
            - id: msg-missing-body-001
              received_at: "2026-06-22T09:12:00Z"
              from: sam@example.com
              subject: Can you approve this?
        sender_metadata:
          sam@example.com:
            relationship: project collaborator
            allowed_topics:
              - approval request
        operator_policy:
          reply_style: concise and factual
          forbidden_commitments:
            - final approval
            - financial or legal promises
          send_gate: send-as.explicit-operator-approval
      expect:
        status: sealed

    - name: inbox-triage-refuses-auto-send
      runner: triage
      inputs:
        objective: Refuse any policy that asks the skill to send automatically.
        inbox_packet:
          packet_id: inbox-auto-send-demo
          messages:
            - id: msg-auto-send-001
              received_at: "2026-06-22T09:20:00Z"
              from: lee@example.com
              subject: Quick confirmation
              body: "Please confirm this by email right away."
        sender_metadata:
          lee@example.com:
            relationship: project collaborator
            allowed_topics:
              - confirmation
        operator_policy:
          reply_style: concise and factual
          auto_send: true
          send_gate: send-as.explicit-operator-approval
      expect:
        status: sealed

    - name: inbox-triage-ready-on-digest-only
      runner: triage
      inputs:
        objective: Classify a bounded digest-only packet without drafting.
        inbox_packet:
          packet_id: inbox-digest-only-demo
          messages:
            - id: msg-digest-001
              received_at: "2026-06-22T09:30:00Z"
              from: noreply@example.net
              subject: Weekly product digest
              body: "Here are this week's product links."
        sender_metadata:
          noreply@example.net:
            relationship: automated digest
            allowed_topics:
              - weekly product digest
        operator_policy:
          reply_style: concise and factual
          send_gate: send-as.explicit-operator-approval
      expect:
          status: sealed

    - name: inbox-triage-stops-when-commitments-not-allowed
      runner: triage
      inputs:
        objective: Draft only when the policy allows the fixed safe commitments.
        inbox_packet:
          packet_id: inbox-commitment-demo
          messages:
            - id: msg-commitment-001
              received_at: "2026-06-22T09:40:00Z"
              from: dana@example.com
              subject: "Re: Launch checklist review"
              body: "Can you confirm whether the launch checklist is ready today?"
        sender_metadata:
          dana@example.com:
            relationship: project collaborator
            allowed_topics:
              - launch checklist
        operator_policy:
          reply_style: concise and factual
          allowed_commitments:
            - acknowledge receipt
          send_gate: send-as.explicit-operator-approval
      expect:
        status: sealed

runners:
  triage:
    default: true
    type: cli-tool
    command: node
    args:
      - run.mjs
    scopes:
      - inbox.packet.read
    policy:
      reads:
        - caller-supplied bounded inbox packet
        - caller-supplied sender metadata
        - caller-supplied operator policy
      writes:
        - evidence.json when output_dir is provided
        - report.md when output_dir is provided
      disallows:
        - sending email
        - fetching private mailbox context
        - mailbox mutation
        - drafting replies when sender or body evidence is missing
    outputs:
      decision: string
      classification: array
      triage_queue: array
      draft_reply: object
      gated_send_proposal: object
      evidence_json: object
      report_md: string
    artifacts:
      wrap_as: inbox_triage_packet
      packet: runx.inbox.triage.v1
    inputs:
      inbox_packet:
        type: json
        required: true
        description: Bounded inbox packet with message ids, sender, subject, and body.
      sender_metadata:
        type: json
        required: true
        description: Known sender metadata keyed by address or message id.
      operator_policy:
        type: json
        required: true
        description: Operator policy for allowed draft content and send gates.
      objective:
        type: string
        required: false
        default: Triage the bounded inbox packet and draft only gated replies.
        description: Operator objective for the triage run.
      output_dir:
        type: string
        required: false
        description: Directory inside the skill package for optional evidence.json and report.md.
